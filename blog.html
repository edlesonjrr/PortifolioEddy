</head>

<body>
  <div class="scroll-progress-bar"></div>
  <header>
    <div class="grid-layout">
      <nav>
        <a href="index.html" class="logo-text">
          <span class="eddy">EDDY</span><span class="code">CODE</span>
        </a>
        <ul class="nav-list">
          <li><a href="index.html">Início</a></li>
          <li><a href="blog.html" class="active">Blog</a></li>

          <div class="line1"></div>
          <div class="line2"></div>
          <div class="line3"></div>
        </div>
      </nav>
    </div>
  </header>
  <main>
    <section class="blog-hero">
      <div class="interface">
        <h1>Blog <span>.</span></h1>
        <p>Artigos sobre desenvolvimento web, programação e tecnologia</p>
      </div>
    </section>

    <section class="blog-search">
      <div class="interface">
        <div class="search-container">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="search-input" placeholder="Buscar artigos...">
          </div>
          <div class="filter-buttons">
            <button class="filter-btn active" data-category="all">Todos</button>
            <button class="filter-btn" data-category="Frontend">Frontend</button>
            <button class="filter-btn" data-category="Backend">Backend</button>
            <button class="filter-btn" data-category="Tutorial">Tutorial</button>
            <button class="filter-btn" data-category="Performance">Performance</button>
            <button class="filter-btn" data-category="DevOps">DevOps</button>
          </div>
        </div>
      </div>
    </section>

    <section class="blog-posts">
      <div class="interface">
        <div id="posts-container" class="posts-grid">
          <div class="loading">
            <i class="bi bi-arrow-repeat"></i>
            <p>Carregando artigos...</p>
          </div>
        </div>
        <div id="no-results" class="no-results" style="display: none;">
          <i class="bi bi-search"></i>
          <p>Nenhum artigo encontrado</p>
        </div>
      </div>
    </section>
