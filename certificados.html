<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados | Eddy Code</title>
    <link rel="icon" href="assets/favicon_E.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/NavBar.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/certificados.css">
</head>

<body>
    <div class="scroll-progress-bar"></div>
    <header>
        <div class="grid-layout">
            <nav>
                <a href="index.html" class="logo-text">
                    <span class="eddy">EDDY</span><span class="code">CODE</span>
                </a>
                <ul class="nav-list">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="certificados.html" class="active">Certificados</a></li>
                    <li><a href="https://api.whatsapp.com/send/?phone=5581987225748" target="_blank">Contato</a></li>
                </ul>
                <div class="mobile-menu">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section class="cert-hero">
            <div class="interface">
                <h1>Certificados <span>.</span></h1>
                <p>Minhas conquistas acadêmicas e profissionais</p>
                <div class="stats">
                    <div class="stat-item">
                        <i class="bi bi-award"></i>
                        <h3 id="total-certs">0</h3>
                        <p>Certificados</p>
                    </div>
                    <div class="stat-item">
                        <i class="bi bi-clock-history"></i>
                        <h3 id="total-hours">0h</h3>
                        <p>de Estudo</p>
                    </div>
                    <div class="stat-item">
                        <i class="bi bi-folder"></i>
                        <h3 id="total-categories">0</h3>
                        <p>Categorias</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="cert-filters">
            <div class="interface">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-category="all">Todos</button>
                    <button class="filter-btn" data-category="Frontend">Graduação</button>
                    <button class="filter-btn" data-category="Backend">Backend</button>
                    <button class="filter-btn" data-category="DevOps">DevOps</button>
                    <button class="filter-btn" data-category="Database">Database</button>
                    <button class="filter-btn" data-category="Design">Design</button>
                </div>
            </div>
        </section>

        <section class="cert-grid">
            <div class="interface">
                <div id="certs-container" class="certs-grid">
                    <div class="loading">
                        <i class="bi bi-arrow-repeat"></i>
                        <p>Carregando certificados...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="cert-modal" class="cert-modal">
        <div class="modal-content">
            <button class="modal-close"><i class="bi bi-x-lg"></i></button>
            <div class="modal-body">
                <img id="modal-image" src="" alt="Certificado">
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <p id="modal-institution"></p>
                    <p id="modal-date"></p>
                    <p id="modal-hours"></p>
                    <div class="modal-actions">
                        <a id="modal-verify" href="#" target="_blank" class="btn-verify">
                            <i class="bi bi-patch-check"></i> Verificar Autenticidade
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="grid-layout">
            <p>Copyright © 2025 <a href="index.html">EDDYCODE</a>.</p>
        </div>
    </footer>
    <a href="https://api.whatsapp.com/send/?phone=5581987225748" class="whatsapp-float" target="_blank"><i
            class="bi bi-whatsapp"></i></a>
    <button class="scroll-to-top"><i class="bi bi-arrow-up"></i></button>
    <script src="js/mobile.js" defer></script>
    <script src="js/certificados.js" defer></script>
</body>

</html>
